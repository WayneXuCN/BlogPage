# =============================================================================
# 站点配置文件
# Site Configuration
# =============================================================================

url = "https://blog.wenjiexu.site"

[title]
zh = "徐文杰的博客"
en = "Wenjie Xu's Blog"

[description]
zh = "分享学术研究、技术教程与生活感悟"
en = "Sharing academic research, tutorials, and life reflections"

[author]
zh = "徐文杰"
en = "Wenjie Xu"

# =============================================================================
# 作者详细信息
# Author Information
# =============================================================================

[authorInfo]
name = "徐文杰"
email = "wenjie.xu.cn@outlook.com"
avatar = "/assets/img/prof_pic.png"

[authorInfo.bio]
zh = "中国科学院博士研究生，研究方向为复杂系统风险管理与韧性评估"
en = "PhD candidate at Chinese Academy of Sciences, focusing on complex system risk management and resilience assessment"
# =============================================================================
# 首页配置
# Home Page Configuration
# =============================================================================

[home]
layout = "classic"          # classic | grid | magazine
postsPerPage = 10
showFeatured = true
featuredCount = 5
carouselAutoPlay = true
carouselInterval = 5000

# =============================================================================
# 布局配置
# Layout Configuration
# =============================================================================

[layouts.classic]
showExcerpt = true
excerptLength = 200

[layouts.grid]
columns = 3
showTags = true

[layouts.magazine]
heroPost = true
sidebarPosts = 4
categorySections = false
postsPerCategory = 4

# =============================================================================
# 文章样式配置
# Post Style Configuration
# =============================================================================

[post]
# 文章排版风格: academic | minimal | magazine | distill
# - academic: 经典学术风格，衬线字体，适合研究论文
# - minimal: 简约现代风格，无衬线字体，干净清爽
# - magazine: 杂志风格，大标题，视觉冲击力强
# - distill: Distill.pub 学术期刊风格，侧边注释，适合深度技术文章
style = "academic"

# 目录位置: left | right | none
# - left: 目录在左侧
# - right: 目录在右侧
# - none: 不显示目录（可在文章 frontmatter 中单独覆盖）
tocPosition = "right"

# 是否显示文章封面图
showCoverImage = true

# 是否显示作者信息
showAuthor = true

# 是否显示更新时间
showUpdatedDate = true

# 代码块样式: github | oneDark | dracula | nord
codeTheme = "github"

# =============================================================================
# 功能开关
# Feature Toggles
# =============================================================================

[features]
comments = true
search = true
rss = true
toc = true
relatedPosts = true
readingTime = true
seriesNav = true
darkMode = true
readingProgress = true
socialShare = true

# =============================================================================
# Giscus 评论配置
# Giscus Comments Configuration
# =============================================================================

[giscus]
repo = "WayneXuCN/blog-comments"
repoId = "R_kgDOxxxxxx"
category = "Announcements"
categoryId = "DIC_kwDOxxxxxx"
mapping = "pathname"
lang = "zh-CN"

# =============================================================================
# 导航配置
# Navigation Configuration
# =============================================================================

[[nav]]
key = "home"
href = "/blog/"

[[nav]]
key = "categories"
href = "/blog/categories/"

[[nav]]
key = "archive"
href = "/blog/archive/"

[[nav]]
key = "about"
href = "/about/"

# =============================================================================
# 社交链接
# Social Links
# =============================================================================

[[social]]
platform = "GitHub"
url = "https://github.com/WayneXuCN"
icon = "github"

[[social]]
platform = "Google Scholar"
url = "https://scholar.google.com/citations?user=eWTidmsAAAAJ"
